<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dziennik: Patrzę władzy na ręce</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; }
    header { padding: 18px 16px; border-bottom: 1px solid rgba(127,127,127,.35); }
    header h1 { margin: 0 0 6px 0; font-size: 18px; }
    header p { margin: 0; opacity: .8; font-size: 13px; }
    main { padding: 14px; max-width: 980px; margin: 0 auto; }

    .card { border: 1px solid rgba(127,127,127,.35); border-radius: 14px; padding: 12px; background: rgba(127,127,127,.06); }
    .row { display:flex; gap:10px; flex-wrap: wrap; align-items:center; }
    label { font-size: 12px; opacity: .85; display:block; margin: 10px 0 6px; }
    input[type="text"], select {
      width: 100%; padding: 10px; border-radius: 10px; border: 1px solid rgba(127,127,127,.35);
      background: transparent;
    }
    .pill { padding: 3px 8px; border-radius: 999px; border: 1px solid rgba(127,127,127,.35); font-size: 12px; opacity: .9; }
    .list { display:flex; flex-direction: column; gap: 10px; margin-top: 12px; }
    .item { border: 1px solid rgba(127,127,127,.25); border-radius: 14px; padding: 12px; background: rgba(127,127,127,.04); }
    .item h2 { margin: 0; font-size: 16px; }
    .meta { display:flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .content { white-space: pre-wrap; margin-top: 10px; line-height: 1.45; font-size: 14px; }
    a { color: inherit; }
    .muted { opacity: .75; font-size: 12px; }
  </style>
</head>
<body>
<header>
  <h1>🗒️ Dziennik: „Patrzę władzy na ręce”</h1>
  <p>Publiczne wpisy o tym, co sprawdzam w moim mieście. (Aktualizowane ręcznie przez właściciela strony)</p>
</header>

<main>
  <section class="card">
    <div class="row">
      <div style="flex:1; min-width: 240px;">
        <label for="q">Szukaj</label>
        <input id="q" type="text" placeholder="Szukaj po tytule, treści, tagach…" />
      </div>
      <div style="flex:1; min-width: 220px;">
        <label for="tag">Tag</label>
        <select id="tag">
          <option value="">Wszystkie</option>
        </select>
      </div>
      <div style="min-width: 180px;">
        <label for="sort">Sortowanie</label>
        <select id="sort">
          <option value="date_desc">Najnowsze</option>
          <option value="date_asc">Najstarsze</option>
          <option value="title_asc">Tytuł A→Z</option>
          <option value="title_desc">Tytuł Z→A</option>
        </select>
      </div>
    </div>
    <div class="muted" style="margin-top:10px;">
      Wpisów: <span id="count">0</span> • Dane są w pliku <code>posts.json</code>.
    </div>
  </section>

  <section class="list" id="list" aria-label="Wpisy"></section>
</main>

<script>
  const els = {
    q: document.getElementById("q"),
    tag: document.getElementById("tag"),
    sort: document.getElementById("sort"),
    list: document.getElementById("list"),
    count: document.getElementById("count"),
  };

  function escapeHtml(s){
    return (s||"").replace(/[&<>"']/g, c => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
    }[c]));
  }

  function collectTags(posts){
    const set = new Set();
    posts.forEach(p => (p.tags||[]).forEach(t => set.add(t)));
    return Array.from(set).sort((a,b)=>a.localeCompare(b));
  }

  function render(posts){
    const q = (els.q.value||"").trim().toLowerCase();
    const tag = els.tag.value;
    let out = posts.slice();

    if (tag) out = out.filter(p => (p.tags||[]).includes(tag));
    if (q){
      out = out.filter(p => {
        const hay = [p.title||"", p.body||"", (p.tags||[]).join(" "), p.date||""].join(" ").toLowerCase();
        return hay.includes(q);
      });
    }

    const s = els.sort.value;
    out.sort((a,b)=>{
      if (s==="date_asc") return (a.date||"").localeCompare(b.date||"");
      if (s==="date_desc") return (b.date||"").localeCompare(a.date||"");
      if (s==="title_asc") return (a.title||"").localeCompare(b.title||"");
      if (s==="title_desc") return (b.title||"").localeCompare(a.title||"");
      return 0;
    });

    els.count.textContent = out.length.toString();
    els.list.innerHTML = "";

    if (!out.length){
      els.list.innerHTML = `<div class="item"><h2>Brak wyników</h2><div class="content">Zmień filtr lub wyszukiwanie.</div></div>`;
      return;
    }

    out.forEach(p=>{
      const tags = (p.tags||[]).map(t => `<span class="pill">#${escapeHtml(t)}</span>`).join(" ");
      const links = (p.links||[]).map(u => `<div class="muted"><a href="${escapeHtml(u)}" target="_blank" rel="noopener noreferrer">${escapeHtml(u)}</a></div>`).join("");
      const el = document.createElement("article");
      el.className = "item";
      el.innerHTML = `
        <h2>${escapeHtml(p.title||"(bez tytułu)")}</h2>
        <div class="meta">
          <span class="pill">${escapeHtml(p.date||"")}</span>
          ${tags}
        </div>
        <div class="content">${escapeHtml(p.body||"")}</div>
        ${links ? `<div style="margin-top:10px;">${links}</div>` : ``}
      `;
      els.list.appendChild(el);
    });
  }

  async function init(){
    const res = await fetch("./posts.json", { cache: "no-store" });
    const posts = await res.json();

    // tag dropdown
    const tags = collectTags(posts);
    for (const t of tags){
      const opt = document.createElement("option");
      opt.value = t;
      opt.textContent = "#" + t;
      els.tag.appendChild(opt);
    }

    const rerender = () => render(posts);
    els.q.addEventListener("input", rerender);
    els.tag.addEventListener("change", rerender);
    els.sort.addEventListener("change", rerender);

    render(posts);
  }

  init().catch(err=>{
    els.list.innerHTML = `<div class="item"><h2>Błąd</h2><div class="content">Nie udało się wczytać posts.json. Sprawdź, czy plik istnieje i ma poprawny format.</div></div>`;
    console.error(err);
  });
</script>
</body>
</html>
